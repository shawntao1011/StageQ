service:
  name: wdb.hk
  type: wdb
  runtime: q

paths:
  bootstrap: src/stageq/q/bootstrap/bootstrap.q

q_runtime:
  port: 32101
  secondary_threads: 4
  utc_offset: 0

q:
  libraries:
    - src/stageq/q/common/util.q
    - src/stageq/q/services/wdb.q

service_config:
  region: hk

  stream:
    topic: futu.basicqot.pb
    consumer_group: wdb.hk

  storage:
    root: /data/wdb/hk
    partition: date

  replay:
    enabled: true